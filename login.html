<!DOCTYPE html>
<html>
<head>
  <title>Login - Spendex</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body>

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<script>
  <script>
  // 1. Define config FIRST
  const firebaseConfig = {
    apiKey: "AIzaSyCPlB-HjpQPfBQbkvH8gApsyBY-ju5l2G4",
    authDomain: "expense-manager-d42e0.firebaseapp.com",
    projectId: "expense-manager-d42e0",
    storageBucket: "expense-manager-d42e0.appspot.com",
    messagingSenderId: "777494191910",
    appId: "1:777494191910:web:4860b0e50889ec703901b0"
  };

  // 2. Initialize AFTER config is defined
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        window.location.replace("index.html"); // Use replace to prevent "back" button loops
      })
      .catch(err => {
        alert(err.message);
      });
  }
/*-------- sign up --------------------*/
  auth.onAuthStateChanged(user => {
    if(user){
      window.location.replace("index.html");
    }
  });
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (password.length < 6) {
    alert("Password must be at least 6 characters.");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
      alert("Account created successfully!");
      window.location.replace("index.html");
    })
    .catch((error) => {
      alert("Error: " + error.message);
    });
}
</script>
</script>

</body>
</html>
